name: arxplore_dev

x-python-dev-build: &python-dev-build
  context: .
  dockerfile: docker/dev/Dockerfile

services:
  dev:
    image: arxplore-dev
    container_name: arxplore-dev
    build: *python-dev-build
    env_file:
      - .env
    environment:
      APP_RUNTIME_MODE: development
      PYTHONPATH: /workspace:/workspace/src
      MONGO_HOST: ${MONGO_HOST}
      POSTGRES_HOST: ${POSTGRES_HOST}
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL}
    working_dir: /workspace
    ports:
      - "0.0.0.0:${JUPYTER_PORT:-18888}:8888"
    command: >
      bash -lc "jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --IdentityProvider.token='${JUPYTER_TOKEN:-dev}'"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace

  django:
    image: arxplore-django
    container_name: arxplore-django
    build: *python-dev-build
    env_file:
      - .env
    environment:
      APP_RUNTIME_MODE: development
      PYTHONPATH: /workspace:/workspace/src
      MONGO_HOST: ${MONGO_HOST}
      POSTGRES_HOST: ${POSTGRES_HOST}
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL}
    working_dir: /workspace
    command: >
      bash -lc "cd /workspace/web &&
      python manage.py runserver 0.0.0.0:8001"
    ports:
      - "0.0.0.0:${DJANGO_PORT:-18001}:8001"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace

  frontend:
    image: arxplore-frontend
    container_name: arxplore-frontend
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    working_dir: /workspace/frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      - django

volumes:
  frontend_node_modules:
