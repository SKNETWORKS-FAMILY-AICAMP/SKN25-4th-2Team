name: arxplore

services:
  django:
    image: arxplore-django
    container_name: arxplore-django
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    env_file:
      - .env
    environment:
      APP_RUNTIME_MODE: production
      PYTHONPATH: /workspace:/workspace/src
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env before running}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      POSTGRES_HOST: ${PROD_POSTGRES_HOST:?Set PROD_POSTGRES_HOST to the main server PostgreSQL host}
      SERVER_POSTGRES_PORT: "5432"
      AIRFLOW_BASE_URL: ${AIRFLOW_BASE_URL:-}
    working_dir: /workspace/backend
    command: >
      bash -lc "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn -c /workspace/docker/django/gunicorn.conf.py arxplore_web.wsgi:application"
    volumes:
      - django_static:/workspace/backend/staticfiles
    restart: unless-stopped

  nginx:
    image: arxplore-nginx
    container_name: arxplore-nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_BASE_PATH: /
    depends_on:
      - django
    ports:
      - "0.0.0.0:${PROD_HTTP_PORT:-80}:80"
    volumes:
      - django_static:/srv/django-static:ro
    restart: unless-stopped

  vite:
    image: arxplore-vite
    container_name: arxplore-vite
    build:
      context: .
      dockerfile: docker/vite/Dockerfile
    working_dir: /workspace/frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/workspace
      - vite_node_modules:/workspace/frontend/node_modules
    depends_on:
      - django
    restart: unless-stopped

  prepare-worker:
    image: arxplore-django
    container_name: arxplore-prepare-worker
    profiles: ["parser"]
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    env_file:
      - .env
    environment:
      APP_RUNTIME_MODE: production
      PYTHONPATH: /workspace:/workspace/src
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env before running}
      POSTGRES_HOST: ${PROD_POSTGRES_HOST:?Set PROD_POSTGRES_HOST to the main server PostgreSQL host}
      SERVER_POSTGRES_PORT: "5432"
    working_dir: /workspace
    command: >
      bash -lc "python3 -m src.pipeline.prepare_worker --mode auto
      --max-jobs-per-run ${MAX_JOBS_PER_RUN:-1}
      --embed-max-chunks ${EMBED_MAX_CHUNKS:-200}
      --embed-backlog-max-chunks ${EMBED_BACKLOG_MAX_CHUNKS:-400}
      --loop
      --sleep-seconds ${SLEEP_SECONDS:-120}
      --wait-timeout-seconds ${WAIT_TIMEOUT_SECONDS:-120}"
    volumes:
      - .:/workspace
    restart: unless-stopped

  layout-parser:
    image: arxplore-layout-parser
    container_name: arxplore-layout-parser
    profiles: ["parser"]
    build:
      context: .
      dockerfile: docker/parser/Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute, utility]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${LAYOUT_PARSER_PORT:-5060}:5060"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5060/', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  django_static:
  vite_node_modules:
