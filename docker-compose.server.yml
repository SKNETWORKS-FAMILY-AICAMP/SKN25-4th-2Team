services:
  arxplore-postgres:
    container_name: arxplore-postgres
    image: arxplore-postgres
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_POSTGRES_DB: ${APP_POSTGRES_DB}
    volumes:
      - arxplore_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${SERVER_POSTGRES_PORT:-15432}:5432"
    restart: unless-stopped

  arxplore-mongo:
    container_name: arxplore-mongo
    image: arxplore-mongo
    build:
      context: .
      dockerfile: docker/mongo/Dockerfile
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - arxplore_mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u ${MONGO_INITDB_ROOT_USERNAME} -p ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "${SERVER_MONGO_PORT:-17017}:27017"
    restart: unless-stopped

  arxplore-airflow-init:
    image: arxplore-airflow
    container_name: arxplore-airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arxplore-postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://arxplore-airflow-web:8080/execution/
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET}
      PYTHONPATH: /opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    command: bash -lc "airflow db migrate"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - arxplore_airflow_logs:/opt/airflow/logs
    depends_on:
      arxplore-postgres:
        condition: service_healthy
      arxplore-mongo:
        condition: service_healthy

  arxplore-airflow-web:
    image: arxplore-airflow
    container_name: arxplore-airflow-web
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arxplore-postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://arxplore-airflow-web:8080/execution/
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET}
      PYTHONPATH: /opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    command: airflow api-server
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - arxplore_airflow_logs:/opt/airflow/logs
    depends_on:
      arxplore-airflow-init:
        condition: service_completed_successfully
    ports:
      - "${SERVER_AIRFLOW_PORT:-18080}:8080"
    restart: unless-stopped

  arxplore-airflow-scheduler:
    image: arxplore-airflow
    container_name: arxplore-airflow-scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arxplore-postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://arxplore-airflow-web:8080/execution/
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET}
      PYTHONPATH: /opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    command: airflow scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - arxplore_airflow_logs:/opt/airflow/logs
    depends_on:
      arxplore-airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  arxplore-airflow-dag-processor:
    image: arxplore-airflow
    container_name: arxplore-airflow-dag-processor
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arxplore-postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://arxplore-airflow-web:8080/execution/
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET}
      PYTHONPATH: /opt/airflow:/opt/airflow/src
    user: "${AIRFLOW_UID:-50000}:0"
    command: airflow dag-processor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - arxplore_airflow_logs:/opt/airflow/logs
    depends_on:
      arxplore-airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  arxplore_postgres_data:
    external: true
    name: arxplore_server_arxplore_postgres_data
  arxplore_mongo_data:
    external: true
    name: arxplore_server_arxplore_mongo_data
  arxplore_airflow_logs:
    external: true
    name: arxplore_server_arxplore_airflow_logs
